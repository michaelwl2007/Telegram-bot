<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Cancelled</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
      padding: 60px 48px;
      max-width: 420px;
      width: 90%;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #1f1010;
      border: 2px solid #ef4444;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }

    .icon svg {
      width: 32px;
      height: 32px;
      stroke: #ef4444;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      color: #ffffff;
    }

    p {
      font-size: 15px;
      color: #888;
      line-height: 1.6;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #ef4444;
      margin: 28px auto;
      border-radius: 2px;
    }

    .note {
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
    <h1>Payment cancelled</h1>
    <p>No charge was made. Head back to Telegram to try again.</p>
    <div class="divider"></div>
    <p class="note">You can close this tab and return to Telegram.</p>
  </div>
</body>
</html>
